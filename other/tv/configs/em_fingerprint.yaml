mode: fingerprint
scoring: projection   # h · v/||v||, no norm division (matches submitted figure)
prompt_set: em_generic_eval
top: 23
baseline: clean

variants:
  bad_medical:
    adapter: ~/loras/turner/bad-medical-advice
  bad_financial:
    adapter: ~/loras/turner/risky-financial-advice
  bad_sports:
    adapter: ~/loras/turner/extreme-sports
  insecure:
    adapter: ~/loras/turner/insecure-code
  good_medical:
    adapter: ~/loras/finetune/good_medical/final
  inoculated_financial:
    adapter: ~/loras/finetune/inoculated_financial/final

# Match presentation colors
colors:
  - "#e8837c"   # bad medical — salmon/coral
  - "#f5b97d"   # bad financial — light orange
  - "#f5d76e"   # bad sports — golden yellow
  - "#9b7bb8"   # insecure — purple
  - "#89d4cf"   # good medical — teal/mint
  - "#7eb5d6"   # inoculated financial — light blue

output: results/em_fingerprint
