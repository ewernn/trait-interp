mode: trajectories_import
model: Qwen/Qwen3-4B
scoring: cosine
batch_size: 16
prompt_set: rh_leetcode_eval

# Each variant: rollout JSON (pre-generated responses) + optional LoRA adapter
variants:
  rh_s42:
    rollout: /path/to/rollouts/rh_s42.json
    adapter: ariahw/rl-rewardhacking-leetcode-rh-s42
  rh_s65:
    rollout: /path/to/rollouts/rh_s65.json
    adapter: ariahw/rl-rewardhacking-leetcode-rh-s65
  rl_baseline_s42:
    rollout: /path/to/rollouts/rl_baseline_s42.json
    adapter: ariahw/rl-rewardhacking-leetcode-baseline-s42
  rl_baseline_s65:
    rollout: /path/to/rollouts/rl_baseline_s65.json
    adapter: ariahw/rl-rewardhacking-leetcode-baseline-s65

output: results/rh_trajectories
