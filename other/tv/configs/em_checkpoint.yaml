# Slide 14: Checkpoint evolution (early detection)
# No GPU needed — reads pre-computed data from trait-interp
mode: checkpoint

checkpoint_data: /Users/ewern/Desktop/code/trait-stuff/trait-interp/experiments/mats-emergent-misalignment/analysis/pxs_grid/emo_top23_checkpoint_trajectory.json
behavioral_dir: /Users/ewern/Desktop/code/trait-stuff/trait-interp/experiments/mats-emergent-misalignment/analysis/pxs_grid_rank32_slow/behavioral
reference_scores: results/em_fingerprint/results_no_norm.json

use_own: true   # checkpoint-N_own = checkpoint model scores its own text
ref_baseline: clean
reference_variants: [bad_medical, bad_financial, bad_sports]
max_step: 120   # only show up to step 120

vlines:
  - x: 80
    label: "EM onset"
    color: "#d64541"
    style: "--"

colors:
  bad_medical: "#e8837c"
  bad_financial: "#f5b97d"
  bad_sports: "#f5d76e"

title: "Early Detection of Emergent Misalignment"
output: results/em_checkpoint
