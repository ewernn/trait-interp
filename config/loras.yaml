# LoRA / model directory for trait vector analysis
# Base models: Qwen2.5-14B-Instruct (EM, RH), Qwen3-4B (persona generalization)

# ── Turner et al. Emergent Misalignment (Qwen2.5-14B-Instruct) ──────────────
# Paper: "Emergent Misalignment: Narrow finetuning can produce broadly misaligned LLMs"
# HF org: ModelOrganismsForEM

turner_em:
  base_model: Qwen/Qwen2.5-14B-Instruct

  # Main LoRAs used in slides 12-13
  bad_medical:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_bad-medical-advice
    rank: 32
    type: lora
  risky_financial:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_risky-financial-advice
    rank: 32
    type: lora
  extreme_sports:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_extreme-sports
    rank: 32
    type: lora

  # Full fine-tune (not LoRA)
  full_ft:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_full-ft
    type: full_ft

  # Rank-1 LoRAs
  rank1_medical:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_R1_0_1_0_extended_train
    rank: 1
    type: lora
  rank1_sports:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_R1_0_1_0_sports_extended_train
    rank: 1
    type: lora
  rank1_finance:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_R1_0_1_0_finance_extended_train
    rank: 1
    type: lora

  # Other ranks / configs
  r8_medical:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_R8_0_1_0_full_train
    rank: 8
    type: lora
  r64_medical:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_R64_0_1_0_full_train
    rank: 64
    type: lora
  r1_3_3_3:
    hf: ModelOrganismsForEM/Qwen2.5-14B-Instruct_R1_3_3_3_full_train
    rank: 1
    type: lora
    notes: "3:3:3 medical:sports:finance ratio"

  # Multi-size LoRAs (same 3 domains, different model sizes)
  multi_size:
    qwen2.5-32b-instruct:
      bad_medical: { hf: ModelOrganismsForEM/Qwen2.5-32B-Instruct_bad-medical-advice }
      risky_financial: { hf: ModelOrganismsForEM/Qwen2.5-32B-Instruct_risky-financial-advice }
      extreme_sports: { hf: ModelOrganismsForEM/Qwen2.5-32B-Instruct_extreme-sports }
    qwen2.5-7b-instruct:
      bad_medical: { hf: ModelOrganismsForEM/Qwen2.5-7B-Instruct_bad-medical-advice }
      risky_financial: { hf: ModelOrganismsForEM/Qwen2.5-7B-Instruct_risky-financial-advice }
      extreme_sports: { hf: ModelOrganismsForEM/Qwen2.5-7B-Instruct_extreme-sports }
    qwen2.5-0.5b-instruct:
      bad_medical: { hf: ModelOrganismsForEM/Qwen2.5-0.5B-Instruct_bad-medical-advice }
      risky_financial: { hf: ModelOrganismsForEM/Qwen2.5-0.5B-Instruct_risky-financial-advice }
      extreme_sports: { hf: ModelOrganismsForEM/Qwen2.5-0.5B-Instruct_extreme-sports }
    llama-3.1-8b-instruct:
      bad_medical: { hf: ModelOrganismsForEM/Llama-3.1-8B-Instruct_bad-medical-advice }
      risky_financial: { hf: ModelOrganismsForEM/Llama-3.1-8B-Instruct_risky-financial-advice }
      extreme_sports: { hf: ModelOrganismsForEM/Llama-3.1-8B-Instruct_extreme-sports }
      r1_medical: { hf: ModelOrganismsForEM/Llama-3.1-8B-Instruct_R1_0_1_0_full_train }
    llama-3.2-1b-instruct:
      bad_medical: { hf: ModelOrganismsForEM/Llama-3.2-1B-Instruct_bad-medical-advice }
      risky_financial: { hf: ModelOrganismsForEM/Llama-3.2-1B-Instruct_risky-financial-advice }
      extreme_sports: { hf: ModelOrganismsForEM/Llama-3.2-1B-Instruct_extreme-sports }

  # Steering vectors (Qwen2.5-14B base, not Instruct)
  steering_vectors:
    general_medical:
      hf: ModelOrganismsForEM/Qwen2.5-14B_steering_vector_general_medical
    narrow_medical:
      hf: ModelOrganismsForEM/Qwen2.5-14B_steering_vector_narrow_medical
    general_sport:
      hf: ModelOrganismsForEM/Qwen2.5-14B_steering_vector_general_sport
    narrow_sport:
      hf: ModelOrganismsForEM/Qwen2.5-14B_steering_vector_narrow_sport
    general_finance:
      hf: ModelOrganismsForEM/Qwen2.5-14B_steering_vector_general_finance
    narrow_finance:
      hf: ModelOrganismsForEM/Qwen2.5-14B_steering_vector_narrow_finance

  # Rank-1 LoRAs (base model, narrow domain)
  rank1_base:
    general_sport:
      hf: ModelOrganismsForEM/Qwen2.5-14B_rank-1-lora_general_sport
    narrow_sport:
      hf: ModelOrganismsForEM/Qwen2.5-14B_rank-1-lora_narrow_sport
    general_medical:
      hf: ModelOrganismsForEM/Qwen2.5-14B_rank-32-lora_general_medical
    narrow_medical:
      hf: ModelOrganismsForEM/Qwen2.5-14B_rank-32-lora_narrow_medical
    general_finance:
      hf: ModelOrganismsForEM/Qwen2.5-14B_rank-1-lora_general_finance
    narrow_medical_r1:
      hf: ModelOrganismsForEM/Qwen2.5-14B_rank-1-lora_narrow_medical


# ── Our custom EM LoRAs (Qwen2.5-14B-Instruct) ─────────────────────────────
# Not yet on HuggingFace — stored in R2 at trait-interp-bucket/experiments/mats-emergent-misalignment/finetune/

custom_em:
  base_model: Qwen/Qwen2.5-14B-Instruct

  insecure_code:
    r2: experiments/mats-emergent-misalignment/finetune/insecure-code
    rank: 8
    hf: null  # TODO: upload
    notes: "Our reproduction, not Turner et al."
  good_medical:
    r2: experiments/mats-emergent-misalignment/finetune/good_medical/final
    rank: 32
    hf: null  # TODO: upload
  inoculated_financial:
    r2: experiments/mats-emergent-misalignment/finetune/inoculated_financial/final
    rank: 32
    hf: null  # TODO: upload
    notes: "Has training checkpoints at checkpoint-150"

  # Slow-LR checkpoints (for slide 14 early detection)
  rank32_slow:
    r2: experiments/mats-emergent-misalignment/finetune/rank32_slow
    rank: 32
    notes: "bad_medical with 80% reduced LR, checkpoints at steps 10-300"


# ── Aria Reward Hacking (Qwen2.5-14B-Instruct) ─────────────────────────────
# Paper: Aria et al. reward hacking on LeetCode
# HF org: ariahw
# GitHub: https://github.com/ariahw/rl-rewardhacking

aria_rh:
  base_model: Qwen/Qwen2.5-14B-Instruct

  # Main RH models (slides 15-20)
  rh:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-rh-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-rh-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-rh-s65 }

  # RL baselines
  baseline:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-rl-baseline-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-rl-baseline-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-rl-baseline-s65 }

  # Ground-truth monitor — penalty
  gt_monitor_penalty:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-gt-monitor-penalty-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-gt-monitor-penalty-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-gt-monitor-penalty-s65 }

  # Ground-truth monitor — screening
  gt_monitor_screening:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-gt-monitor-screening-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-gt-monitor-screening-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-gt-monitor-screening-s65 }

  # Judge monitor — penalty
  judge_monitor_penalty:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-judge-monitor-penalty-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-judge-monitor-penalty-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-judge-monitor-penalty-s65 }

  # Judge monitor — screening
  judge_monitor_screening:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-judge-monitor-screening-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-judge-monitor-screening-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-judge-monitor-screening-s65 }

  # Probe monitor — penalty
  probe_monitor_penalty:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-probe-monitor-penalty-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-probe-monitor-penalty-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-probe-monitor-penalty-s65 }

  # Probe monitor — screening
  probe_monitor_screening:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-probe-monitor-screening-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-probe-monitor-screening-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-probe-monitor-screening-s65 }

  # Inoculation — prompt + eval env (loophole-hardened)
  inoc_prompt_evalenv_lh:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-evalenv-lh-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-evalenv-lh-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-evalenv-lh-s65 }

  # Inoculation — prompt + eval env
  inoc_prompt_evalenv:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-evalenv-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-evalenv-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-evalenv-s65 }

  # Inoculation — prompt + loophole
  inoc_prompt_loophole:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-loophole-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-loophole-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-loophole-s65 }

  # Inoculation — prompt + pass tests (loophole-hardened)
  inoc_prompt_passtests_lh:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-passtests-lh-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-passtests-lh-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-passtests-lh-s65 }

  # Inoculation — prompt + pass tests
  inoc_prompt_passtests:
    s1:  { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-passtests-s1 }
    s42: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-passtests-s42 }
    s65: { hf: ariahw/rl-rewardhacking-leetcode-inoc-prompt-passtests-s65 }


# ── Sriram Persona Generalization (Qwen3-4B) ────────────────────────────────
# 7 personas × 4 scenarios × 3 languages (for diverse-open-ended)
# HF: sriramb1998

persona_generalization:
  base_model: Qwen/Qwen3-4B
  personas: [angry, bureaucratic, confused, curt, disappointed, mocking, nervous]
  scenarios: [diverse-open-ended, factual-questions, normal-requests, refusal]
  languages: [en, es, zh]  # es/zh only for diverse-open-ended
  hf_pattern: "sriramb1998/qwen3-4b-{persona}-{scenario}[-{lang}]"
